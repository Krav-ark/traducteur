<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tamil ↔ Français</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --card: #1a1916;
    --border: #2e2b25;
    --gold: #c9a84c;
    --gold2: #f0d080;
    --text: #f0ead8;
    --muted: #7a7060;
    --fr: #3a7bd5;
    --ta: #d45a2a;
    --green: #4caf7d;
    --red: #e05555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(212,90,42,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .logo span {
    color: var(--gold2);
  }

  .subtitle {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Language toggle */
  .lang-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px;
    margin-bottom: 20px;
  }

  .lang-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    border-radius: 12px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .lang-btn.fr { color: var(--fr); }
  .lang-btn.ta { color: var(--ta); }
  .lang-btn.active {
    background: var(--border);
    color: var(--text);
  }

  .swap-btn {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    background: var(--bg);
    border-radius: 50%;
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .swap-btn:hover { background: var(--border); transform: rotate(180deg); }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .card-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .card-label.fr { color: var(--fr); }
  .card-label.ta { color: var(--ta); }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 300;
    resize: none;
    min-height: 100px;
    line-height: 1.6;
  }

  textarea::placeholder { color: var(--muted); }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  /* Mic button */
  .mic-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
  }

  .mic-btn:hover { background: rgba(201,168,76,0.1); }

  .mic-btn.recording {
    border-color: var(--red);
    color: var(--red);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(224,85,85,0.4); }
    50% { box-shadow: 0 0 0 10px rgba(224,85,85,0); }
  }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .clear-btn:hover { border-color: var(--muted); color: var(--text); }

  /* Translate button */
  .translate-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none;
    border-radius: 16px;
    color: #0f0e0c;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .translate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .translate-btn:active { transform: translateY(0); }
  .translate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Result card */
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 12px;
    display: none;
  }

  .result-card.visible { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-text {
    font-size: 17px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 12px;
    min-height: 40px;
  }

  .result-text.loading {
    color: var(--muted);
    font-style: italic;
    font-size: 14px;
  }

  .result-actions {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .action-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Status bar */
  .status {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 8px;
    min-height: 28px;
  }

  .status.error { color: var(--red); }
  .status.success { color: var(--green); }

  /* API key setup */
  .setup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,14,12,0.97);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .setup-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 20px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }

  .setup-icon { font-size: 40px; margin-bottom: 16px; }

  .setup-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .setup-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .setup-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .setup-input:focus { border-color: var(--gold); }

  .setup-save {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none;
    border-radius: 12px;
    color: #0f0e0c;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }

  .dots span {
    animation: blink 1.4s infinite;
    opacity: 0;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<!-- API Key Setup -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <div class="setup-icon">🔑</div>
    <div class="setup-title">Configuration</div>
    <div class="setup-desc">Entre ta clé API Google Cloud pour activer la traduction et la reconnaissance vocale.</div>
    <input type="text" class="setup-input" id="apiKeyInput" placeholder="AIzaSy..." autocomplete="off" />
    <button class="setup-save" onclick="saveApiKey()">Commencer →</button>
  </div>
</div>

<div class="container">
  <header>
    <div class="logo">தமிழ் <span>↔</span> Français</div>
    <div class="subtitle">Traducteur familial</div>
  </header>

  <!-- Language bar -->
  <div class="lang-bar">
    <button class="lang-btn fr active" id="btnFr" onclick="setSourceLang('fr')">🇫🇷 Français</button>
    <button class="swap-btn" onclick="swapLanguages()">⇄</button>
    <button class="lang-btn ta" id="btnTa" onclick="setSourceLang('ta')">🇱🇰 Tamil</button>
  </div>

  <!-- Input card -->
  <div class="card">
    <div class="card-label" id="inputLabel">fr</div>
    <textarea id="inputText" placeholder="Écris ou parle en français..." rows="4"></textarea>
    <div class="card-footer">
      <button class="clear-btn" onclick="clearAll()">Effacer</button>
      <button class="mic-btn" id="micBtn" onclick="toggleRecording()" title="Parler">
        🎙️
      </button>
    </div>
  </div>

  <!-- Translate button -->
  <button class="translate-btn" onclick="translate()" id="translateBtn">
    Traduire
  </button>

  <!-- Result card -->
  <div class="result-card" id="resultCard">
    <div class="card-label" id="outputLabel">ta</div>
    <div class="result-text" id="resultText"></div>
    <div class="result-actions">
      <button class="action-btn" onclick="speakResult()">🔊 Écouter</button>
      <button class="action-btn" onclick="copyResult()">📋 Copier</button>
    </div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
  let apiKey = '';
  let sourceLang = 'fr';
  let targetLang = 'ta';
  let recognition = null;
  let isRecording = false;
  let currentTranslation = '';

  // Init
  window.onload = () => {
    const saved = localStorage.getItem('gcApiKey');
    if (saved) {
      apiKey = saved;
      document.getElementById('setupOverlay').style.display = 'none';
    }
  };

  function saveApiKey() {
    const val = document.getElementById('apiKeyInput').value.trim();
    if (!val || !val.startsWith('AIza')) {
      alert('Clé invalide. Elle doit commencer par "AIza"');
      return;
    }
    apiKey = val;
    localStorage.setItem('gcApiKey', val);
    document.getElementById('setupOverlay').style.display = 'none';
  }

  function setSourceLang(lang) {
    sourceLang = lang;
    targetLang = lang === 'fr' ? 'ta' : 'fr';
    updateLabels();
    document.getElementById('btnFr').classList.toggle('active', lang === 'fr');
    document.getElementById('btnTa').classList.toggle('active', lang === 'ta');
    document.getElementById('inputText').placeholder = lang === 'fr' 
      ? 'Écris ou parle en français...' 
      : 'தமிழில் எழுதுங்கள் அல்லது பேசுங்கள்...';
  }

  function swapLanguages() {
    setSourceLang(sourceLang === 'fr' ? 'ta' : 'fr');
    const inputText = document.getElementById('inputText').value;
    const resultText = currentTranslation;
    document.getElementById('inputText').value = resultText;
    if (inputText) {
      document.getElementById('resultText').textContent = inputText;
      currentTranslation = inputText;
      document.getElementById('resultCard').classList.add('visible');
    }
  }

  function updateLabels() {
    const langNames = { fr: '🇫🇷 Français', ta: '🇱🇰 Tamil Sri Lankais' };
    document.getElementById('inputLabel').textContent = langNames[sourceLang];
    document.getElementById('inputLabel').className = 'card-label ' + sourceLang;
    document.getElementById('outputLabel').textContent = langNames[targetLang];
    document.getElementById('outputLabel').className = 'card-label ' + targetLang;
  }

  function clearAll() {
    document.getElementById('inputText').value = '';
    document.getElementById('resultCard').classList.remove('visible');
    document.getElementById('status').textContent = '';
    currentTranslation = '';
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  // Translation
  async function translate() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) { setStatus('Entre du texte d\'abord', 'error'); return; }
    if (!apiKey) { document.getElementById('setupOverlay').style.display = 'flex'; return; }

    const btn = document.getElementById('translateBtn');
    btn.disabled = true;
    btn.innerHTML = 'Traduction<span class="dots"><span>.</span><span>.</span><span>.</span></span>';

    const resultCard = document.getElementById('resultCard');
    const resultText = document.getElementById('resultText');
    resultCard.classList.add('visible');
    resultText.className = 'result-text loading';
    resultText.textContent = 'Traduction en cours...';

    try {
      const response = await fetch(
        `https://translation.googleapis.com/language/translate/v2?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            q: text,
            source: sourceLang,
            target: targetLang,
            format: 'text'
          })
        }
      );

      const data = await response.json();

      if (data.error) {
        throw new Error(data.error.message);
      }

      currentTranslation = data.data.translations[0].translatedText;
      resultText.className = 'result-text';
      resultText.textContent = currentTranslation;
      setStatus('✓ Traduction réussie', 'success');

    } catch (err) {
      resultText.className = 'result-text';
      resultText.textContent = '⚠️ Erreur : ' + err.message;
      setStatus('Erreur de traduction', 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Traduire';
  }

  // Text-to-Speech
  async function speakResult() {
    if (!currentTranslation) return;
    if (!apiKey) return;

    setStatus('🔊 Lecture en cours...');

    try {
      const langCode = targetLang === 'ta' ? 'ta-LK' : 'fr-FR';
      const voiceName = targetLang === 'ta' ? 'ta-IN-Standard-A' : 'fr-FR-Standard-A';

      const response = await fetch(
        `https://texttospeech.googleapis.com/v1/text:synthesize?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            input: { text: currentTranslation },
            voice: { languageCode: langCode, name: voiceName },
            audioConfig: { audioEncoding: 'MP3' }
          })
        }
      );

      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      const audio = new Audio('data:audio/mp3;base64,' + data.audioContent);
      audio.play();
      setStatus('');

    } catch (err) {
      // Fallback to browser TTS
      const utterance = new SpeechSynthesisUtterance(currentTranslation);
      utterance.lang = targetLang === 'ta' ? 'ta-IN' : 'fr-FR';
      window.speechSynthesis.speak(utterance);
      setStatus('');
    }
  }

  function copyResult() {
    if (!currentTranslation) return;
    navigator.clipboard.writeText(currentTranslation).then(() => {
      setStatus('✓ Copié !', 'success');
      setTimeout(() => setStatus(''), 2000);
    });
  }

  // Speech Recognition
  function toggleRecording() {
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  }

  function startRecording() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      setStatus('Reconnaissance vocale non supportée sur ce navigateur', 'error');
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = sourceLang === 'fr' ? 'fr-FR' : 'ta-IN';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent = '⏹️';
      setStatus('🎙️ Écoute en cours...');
    };

    recognition.onresult = (event) => {
      let transcript = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        transcript += event.results[i][0].transcript;
      }
      document.getElementById('inputText').value = transcript;
    };

    recognition.onend = () => {
      isRecording = false;
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('micBtn').textContent = '🎙️';
      setStatus('');
      // Auto-translate after speech
      const text = document.getElementById('inputText').value.trim();
      if (text) translate();
    };

    recognition.onerror = (e) => {
      setStatus('Erreur micro : ' + e.error, 'error');
      isRecording = false;
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('micBtn').textContent = '🎙️';
    };

    recognition.start();
  }

  function stopRecording() {
    if (recognition) recognition.stop();
  }

  // Enter key to translate
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      translate();
    }
  });

  updateLabels();
</script>
</body>
</html>
