<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tamil ↔ Français</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --card: #1a1916;
    --border: #2e2b25;
    --gold: #c9a84c;
    --gold2: #f0d080;
    --text: #f0ead8;
    --muted: #7a7060;
    --fr: #3a7bd5;
    --ta: #d45a2a;
    --green: #4caf7d;
    --red: #e05555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(212,90,42,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,14,12,0.97);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .overlay.hidden { display: none; }

  .box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 20px;
    max-width: 400px;
    width: 100%;
    text-align: center;
  }

  .box-icon { font-size: 44px; margin-bottom: 16px; }

  .box-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .box-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  /* Role selection */
  .role-cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }

  .role-card {
    padding: 18px;
    border: 2px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    background: transparent;
    width: 100%;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
  }

  .role-card:hover, .role-card.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  .role-card .role-flag { font-size: 28px; margin-bottom: 6px; }
  .role-card .role-name { font-size: 16px; font-weight: 500; color: var(--text); }
  .role-card .role-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* API key input */
  .setup-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .setup-input:focus { border-color: var(--gold); }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none;
    border-radius: 12px;
    color: #0f0e0c;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* MAIN APP */
  .app { position: relative; z-index: 1; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px 0;
    margin-bottom: 16px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
  }

  .user-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 13px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }

  .status-dot.online { background: var(--green); }

  /* Connection banner */
  .conn-banner {
    margin: 0 16px 12px;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    text-align: center;
    background: rgba(76,175,125,0.1);
    border: 1px solid rgba(76,175,125,0.2);
    color: var(--green);
    display: none;
  }

  .conn-banner.visible { display: block; }
  .conn-banner.waiting {
    background: rgba(201,168,76,0.1);
    border-color: rgba(201,168,76,0.2);
    color: var(--gold);
  }

  /* Main conversation area */
  .conversation {
    padding: 0 16px;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 200px;
    max-height: 40vh;
    overflow-y: auto;
  }

  .message {
    padding: 12px 14px;
    border-radius: 16px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }

  .message.mine {
    align-self: flex-end;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.25);
    border-bottom-right-radius: 4px;
  }

  .message.theirs {
    align-self: flex-start;
    background: var(--card);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .message-original {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.5;
  }

  .message-translation {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
  }

  .message-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    text-align: right;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Input area */
  .input-area {
    padding: 0 16px;
    margin-bottom: 12px;
  }

  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 14px;
  }

  .input-card textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 300;
    resize: none;
    min-height: 70px;
    line-height: 1.6;
  }

  .input-card textarea::placeholder { color: var(--muted); }

  .input-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  /* Mic button */
  .mic-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-size: 26px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .mic-btn:active { transform: scale(0.95); }

  .mic-btn.recording {
    border-color: var(--red);
    color: var(--red);
    background: rgba(224,85,85,0.1);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(224,85,85,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(224,85,85,0); }
  }

  .send-btn {
    padding: 12px 24px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none;
    border-radius: 12px;
    color: #0f0e0c;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Recording indicator */
  .recording-indicator {
    text-align: center;
    font-size: 13px;
    color: var(--red);
    padding: 6px;
    display: none;
  }

  .recording-indicator.visible { display: block; }

  /* Bottom status */
  .bottom-status {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 4px 16px 20px;
  }

  /* Incoming translation popup */
  .incoming-popup {
    position: fixed;
    top: 20px;
    left: 16px;
    right: 16px;
    background: var(--card);
    border: 1px solid var(--gold);
    border-radius: 16px;
    padding: 14px 16px;
    z-index: 50;
    display: none;
    animation: slideDown 0.3s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .incoming-popup.visible { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .incoming-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .incoming-text {
    font-size: 17px;
    color: var(--text);
    line-height: 1.5;
  }

  .incoming-original {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Share link */
  .share-section {
    padding: 0 16px 16px;
  }

  .share-btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .share-btn:hover { border-color: var(--gold); color: var(--gold); }

  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 40px 20px;
  }

  .empty-state .empty-icon { font-size: 36px; margin-bottom: 10px; }
</style>
</head>
<body>

<!-- STEP 1: API Key -->
<div class="overlay" id="overlayApiKey">
  <div class="box">
    <div class="box-icon">🔑</div>
    <div class="box-title">Clé API Google</div>
    <div class="box-desc">Entre ta clé Google Cloud pour activer la traduction et la voix.</div>
    <input type="text" class="setup-input" id="apiKeyInput" placeholder="AIzaSy..." />
    <button class="btn-primary" onclick="saveApiKey()">Continuer →</button>
  </div>
</div>

<!-- STEP 2: Role selection -->
<div class="overlay hidden" id="overlayRole">
  <div class="box">
    <div class="box-icon">👥</div>
    <div class="box-title">Qui es-tu ?</div>
    <div class="box-desc">Chaque personne choisit son rôle sur son téléphone.</div>
    <div class="role-cards">
      <button class="role-card" onclick="selectRole('fr')" id="roleFr">
        <div class="role-flag">🇫🇷</div>
        <div class="role-name">Je parle Français</div>
        <div class="role-desc">Je reçois les traductions en Français</div>
      </button>
      <button class="role-card" onclick="selectRole('ta')" id="roleTa">
        <div class="role-flag">🇱🇰</div>
        <div class="role-name">நான் தமிழில் பேசுகிறேன்</div>
        <div class="role-desc">Je parle Tamil Sri Lankais</div>
      </button>
    </div>
    <button class="btn-primary" id="roleConfirmBtn" onclick="confirmRole()" disabled>Commencer</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="mainApp" style="display:none">

  <!-- Incoming popup -->
  <div class="incoming-popup" id="incomingPopup">
    <div class="incoming-label">🔊 Message reçu</div>
    <div class="incoming-text" id="incomingText"></div>
    <div class="incoming-original" id="incomingOriginal"></div>
  </div>

  <header>
    <div class="logo">தமிழ் ↔ FR</div>
    <div class="user-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="userLabel">...</span>
    </div>
  </header>

  <div class="conn-banner waiting" id="connBanner">
    ⏳ En attente de l'autre personne...
  </div>

  <!-- Conversation -->
  <div class="conversation" id="conversation">
    <div class="empty-state">
      <div class="empty-icon">💬</div>
      <div>La conversation apparaîtra ici</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-card">
      <textarea id="inputText" placeholder="Écris ou utilise le micro..." rows="3"></textarea>
      <div class="input-footer">
        <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎙️</button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Envoyer ✈️</button>
      </div>
    </div>
  </div>

  <div class="recording-indicator" id="recordingIndicator">
    🔴 Écoute en cours... (appuie à nouveau pour arrêter)
  </div>

  <!-- Share -->
  <div class="share-section">
    <button class="share-btn" onclick="shareLink()">
      🔗 Partager ce lien avec l'autre personne
    </button>
  </div>

  <div class="bottom-status" id="bottomStatus"></div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, onValue, push, set, serverTimestamp, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDFNqvx_7Bl46uvJro6GvXBzcew7bAUWo8",
    authDomain: "traducteur-parents.firebaseapp.com",
    databaseURL: "https://traducteur-parents-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "traducteur-parents",
    storageBucket: "traducteur-parents.firebasestorage.app",
    messagingSenderId: "515262663980",
    appId: "1:515262663980:web:4cadd1c1d6070f3d173089"
  };

  const firebaseApp = initializeApp(firebaseConfig);
  const db = getDatabase(firebaseApp);

  let myRole = null; // 'fr' or 'ta'
  let googleApiKey = '';
  let recognition = null;
  let isRecording = false;
  let otherOnline = false;
  let lastMessageKey = null;

  // Make functions global
  window.saveApiKey = () => {
    const val = document.getElementById('apiKeyInput').value.trim();
    if (!val || !val.startsWith('AIza')) {
      alert('Clé invalide. Elle doit commencer par "AIza"');
      return;
    }
    googleApiKey = val;
    localStorage.setItem('gcApiKey', val);
    document.getElementById('overlayApiKey').classList.add('hidden');
    document.getElementById('overlayRole').classList.remove('hidden');
  };

  window.selectRole = (role) => {
    myRole = role;
    document.getElementById('roleFr').classList.toggle('selected', role === 'fr');
    document.getElementById('roleTa').classList.toggle('selected', role === 'ta');
    document.getElementById('roleConfirmBtn').disabled = false;
  };

  window.confirmRole = () => {
    if (!myRole) return;
    localStorage.setItem('myRole', myRole);
    document.getElementById('overlayRole').classList.add('hidden');
    document.getElementById('mainApp').style.display = 'block';
    initApp();
  };

  window.toggleRecording = () => {
    if (isRecording) stopRecording();
    else startRecording();
  };

  window.sendMessage = async () => {
    const text = document.getElementById('inputText').value.trim();
    if (!text) return;
    await translateAndSend(text);
    document.getElementById('inputText').value = '';
  };

  window.shareLink = () => {
    const url = window.location.href;
    if (navigator.share) {
      navigator.share({ title: 'Traducteur Tamil ↔ Français', url });
    } else {
      navigator.clipboard.writeText(url);
      setStatus('✓ Lien copié !');
    }
  };

  function initApp() {
    const savedKey = localStorage.getItem('gcApiKey');
    if (savedKey) googleApiKey = savedKey;

    const label = myRole === 'fr' ? '🇫🇷 Français' : '🇱🇰 Tamil';
    document.getElementById('userLabel').textContent = label;
    document.getElementById('inputText').placeholder = 
      myRole === 'fr' ? 'Écris en français...' : 'தமிழில் எழுதுங்கள்...';

    // Presence
    const myPresenceRef = ref(db, `presence/${myRole}`);
    set(myPresenceRef, true);
    onDisconnect(myPresenceRef).set(false);

    // Watch other's presence
    const otherRole = myRole === 'fr' ? 'ta' : 'fr';
    onValue(ref(db, `presence/${otherRole}`), (snap) => {
      otherOnline = snap.val() === true;
      updateConnectionStatus();
    });

    // Watch messages
    onValue(ref(db, 'messages'), (snap) => {
      const data = snap.val();
      if (!data) return;
      renderMessages(data);
    });
  }

  function updateConnectionStatus() {
    const dot = document.getElementById('statusDot');
    const banner = document.getElementById('connBanner');
    if (otherOnline) {
      dot.classList.add('online');
      banner.textContent = '✅ Les deux personnes sont connectées';
      banner.classList.remove('waiting');
      banner.classList.add('visible');
      setTimeout(() => banner.classList.remove('visible'), 3000);
    } else {
      dot.classList.remove('online');
      banner.textContent = '⏳ En attente de l\'autre personne...';
      banner.classList.add('waiting', 'visible');
    }
  }

  function renderMessages(data) {
    const conv = document.getElementById('conversation');
    const keys = Object.keys(data).sort();
    
    if (keys.length === 0) return;
    
    conv.innerHTML = '';
    keys.forEach(key => {
      const msg = data[key];
      const isMine = msg.from === myRole;
      
      const div = document.createElement('div');
      div.className = `message ${isMine ? 'mine' : 'theirs'}`;
      
      const displayText = isMine ? msg.original : msg.translation;
      const subText = isMine ? msg.translation : msg.original;
      
      div.innerHTML = `
        <div class="message-original">${displayText}</div>
        <div class="message-translation">${subText}</div>
        <div class="message-meta">${isMine ? 'Moi' : (msg.from === 'fr' ? '🇫🇷' : '🇱🇰')}</div>
      `;
      conv.appendChild(div);

      // Auto-speak incoming messages
      if (!isMine && key !== lastMessageKey) {
        lastMessageKey = key;
        showIncomingPopup(msg.translation, msg.original);
        speakText(msg.translation, myRole);
      }
    });

    conv.scrollTop = conv.scrollHeight;
  }

  function showIncomingPopup(translation, original) {
    const popup = document.getElementById('incomingPopup');
    document.getElementById('incomingText').textContent = translation;
    document.getElementById('incomingOriginal').textContent = original;
    popup.classList.add('visible');
    setTimeout(() => popup.classList.remove('visible'), 5000);
  }

  async function translateAndSend(text) {
    const targetLang = myRole === 'fr' ? 'ta' : 'fr';
    setStatus('Traduction...');

    try {
      const response = await fetch(
        `https://translation.googleapis.com/language/translate/v2?key=${googleApiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ q: text, source: myRole, target: targetLang, format: 'text' })
        }
      );
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);

      const translation = data.data.translations[0].translatedText;

      // Save to Firebase
      await push(ref(db, 'messages'), {
        from: myRole,
        original: text,
        translation: translation,
        timestamp: serverTimestamp()
      });

      setStatus('');
    } catch (err) {
      setStatus('Erreur : ' + err.message);
    }
  }

  async function speakText(text, lang) {
    try {
      const langCode = lang === 'ta' ? 'ta-LK' : 'fr-FR';
      const voiceName = lang === 'ta' ? 'ta-IN-Standard-A' : 'fr-FR-Standard-A';

      const response = await fetch(
        `https://texttospeech.googleapis.com/v1/text:synthesize?key=${googleApiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            input: { text },
            voice: { languageCode: langCode, name: voiceName },
            audioConfig: { audioEncoding: 'MP3' }
          })
        }
      );
      const data = await response.json();
      if (data.audioContent) {
        const audio = new Audio('data:audio/mp3;base64,' + data.audioContent);
        audio.play();
        return;
      }
    } catch (e) {}

    // Fallback browser TTS
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang === 'ta' ? 'ta-IN' : 'fr-FR';
    window.speechSynthesis.speak(utterance);
  }

  function startRecording() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      setStatus('Reconnaissance vocale non supportée');
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang = myRole === 'fr' ? 'fr-FR' : 'ta-IN';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onstart = () => {
      isRecording = true;
      document.getElementById('micBtn').classList.add('recording');
      document.getElementById('micBtn').textContent = '⏹️';
      document.getElementById('recordingIndicator').classList.add('visible');
    };

    recognition.onresult = (event) => {
      let transcript = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        transcript += event.results[i][0].transcript;
      }
      document.getElementById('inputText').value = transcript;
    };

    recognition.onend = () => {
      isRecording = false;
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('micBtn').textContent = '🎙️';
      document.getElementById('recordingIndicator').classList.remove('visible');
      const text = document.getElementById('inputText').value.trim();
      if (text) {
        translateAndSend(text);
        document.getElementById('inputText').value = '';
      }
    };

    recognition.onerror = (e) => {
      setStatus('Erreur micro : ' + e.error);
      isRecording = false;
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('micBtn').textContent = '🎙️';
      document.getElementById('recordingIndicator').classList.remove('visible');
    };

    recognition.start();
  }

  function stopRecording() {
    if (recognition) recognition.stop();
  }

  function setStatus(msg) {
    document.getElementById('bottomStatus').textContent = msg;
  }

  // Init on load
  window.addEventListener('load', () => {
    const savedKey = localStorage.getItem('gcApiKey');
    const savedRole = localStorage.getItem('myRole');

    if (savedKey && savedRole) {
      googleApiKey = savedKey;
      myRole = savedRole;
      document.getElementById('overlayApiKey').classList.add('hidden');
      document.getElementById('overlayRole').classList.add('hidden');
      document.getElementById('mainApp').style.display = 'block';
      initApp();
    } else if (savedKey) {
      googleApiKey = savedKey;
      document.getElementById('overlayApiKey').classList.add('hidden');
      document.getElementById('overlayRole').classList.remove('hidden');
    }
  });
</script>
</body>
</html>
